# Single source of truth for the runtime — used by local dev, Docker, and CI.
#
# This env supports the four-notebook lizards replication pipeline
# (Sinervo et al. 2010 h_r mechanism applied to Iberian Lacertidae under
# the Destination Earth Climate DT SSP3-7.0 archive).
#
# Pinning philosophy (matches `weatherxbiodiversity-projection` Bombus
# sister env, which is the known-working reference):
#
# - Strict ceiling (`<X`) ONLY where a known-breaking upstream change
#   has shipped (currently: `arviz<0.22` for PyMC's removed
#   `from arviz import concat`).
# - Lower bounds (`>=`) where we depend on an API/feature added at
#   that version (xarray, pandas).
# - Strict pins (`=X.Y`) ONLY for packages whose API or wheel-state
#   we need to nail down (healpix-plot, python-eccodes, datrie).
# - Otherwise unpinned — let conda-forge solver pick the latest
#   internally-consistent set. Iterates more robustly than strict
#   patch-pinning when the ecosystem moves.
#
# Naming / channel order: conda-forge first (DOMAIN.md / CLAUDE.md).
name: "weatherxbiodiversity-lizards"
channels:
  - conda-forge
dependencies:
  - python=3.12

  # --- core scientific stack ---
  # numpy is unpinned: the healpix-geo / healpix-plot stack requires
  # numpy>=2 (healpix-plot 2026.5.1 wants numpy>=2.3), and the Bayesian
  # stack below is numpy-2-compatible from pymc>=5.20 / pytensor>=2.27.
  - numpy
  - pandas>=2.0
  - xarray>=2024.6
  - scipy
  - matplotlib
  - seaborn
  - statsmodels
  - pyarrow
  - dask

  # --- Bayesian inference (mirrors the Bombus weatherxbio Tier-1 GLMM) ---
  # arviz<0.22: pymc still does `from arviz import concat`, which was
  # removed in arviz 0.22+ (the 1.x modular split). Pin arviz first;
  # bambi/pymc/pytensor follow conda-forge's compatible selections.
  - arviz<0.22
  - bambi                          # high-level GLMM fit on top of pymc
  - pymc                           # MCMC backend (NUTS via pytensor)

  # --- climate / EO data I/O ---
  - netcdf4
  - zarr
  - eccodes                        # ECMWF GRIB C library
  - python-eccodes                 # Python binding; unpinned because the
                                   # =1.6 line we tried earlier has no
                                   # py312 build on linux-64 (only osx-arm64).
                                   # Solver picks latest py312-compatible
                                   # (1.7+ on linux, 1.6.1 on osx-arm64).
  - cfgrib                         # xarray GRIB backend (used for DestinE inspect)
  - requests

  # --- HEALPix ---
  # DOMAIN.md: default to healpix-geo (geo-aware, lon/lat, cartopy) over
  # healpy for any geographic data. Lizards chain mirrors Bombus Phase C
  # at HEALPix-NESTED nside=128 (native DestinE Climate DT grid).
  # No xdggs: that's the xarray-DGGS interface for multi-grid (H3 +
  # rHEALPix + S2 + HEALPix) work — pulls in h3ronpy which has linux-64
  # py312 build issues. Lizards chain is HEALPix-only via healpix-geo,
  # mirroring Bombus, so xdggs is dead weight.
  - healpix-geo

  # --- biodiversity occurrence data ---
  # pygbif: GBIF Occurrence Download API client. The lizards Lacertidae
  # download is pre-minted via the GBIF UI per the Bombus pattern (no
  # pygbif credentials needed at notebook execution time); pygbif is
  # still installed for the one-off backbone-taxonkey lookup script.
  - pygbif

  # --- geospatial ---
  # geopandas>=1.0: sensible modern floor (1.0 added pyogrio backend,
  # CRS-aware spatial joins).
  - geopandas>=1.0
  - cartopy
  - pyproj
  - shapely
  - rasterio

  # --- RDF (re-running the FORRT chain-import script in scripts/) ---
  - rdflib

  # --- notebook execution + Jupyter Book build (CI uses these) ---
  - jupytext
  - jupyterlab
  - nbclient
  - ipykernel
  - jupyter

  # snakemake's datrie dep — install from conda-forge to avoid the broken
  # PyPI wheel (duplicate LC_RPATH crashes dyld on macOS arm64).
  - datrie=0.8

  - pip
  - pip:
    # snakemake on conda-forge fails to solve under setup-micromamba@v3
    # (per docs/cicd-conventions.md) — install via pip.
    - snakemake
    # earthkit-data + polytope-client: pip-only on the DestinE Jupyter
    # platform image; install via pip on local for env parity with the
    # Bombus reference repo.
    - earthkit-data
    - polytope-client
    # healpix-plot — EOPF-DGGS canonical HEALPix+cartopy bridge
    # (DOMAIN.md). PyPI-only as of 2026-05. Pinned to 2026.5.1 because
    # upstream switched from 0.1.x semver to date-versioning at that
    # release and we want to nail down the API across the FAIR archive.
    - healpix-plot==2026.5.1
